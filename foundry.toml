[profile.default]
src = 'contracts'
out = 'out'
libs = ['node_modules', 'lib']
test = 'test'
cache_path  = 'cache_forge'
ffi = true
fs_permissions = [{ access = "read-write", path = "./"}]
ignored_error_codes = [
    2394,
    3860,
    5574,
    2072,
    2968  # Invalid NatSpec custom tag (upstream Crane issue with @custom:topic0)
]
ignored_warnings_from = ["lib/daosys/lib/crane/"]
# block_gas_limit = 999999999999999999
solc = "0.8.30"
# evm_version = 'prague'
# Print the sizes of the compiled contracts
sizes = true
# Enables or disables the optimizer
optimizer = true
# optimizer_runs = 4294967295
# CamelotFactory requires 16683 to fit within execution code size limits
# optimizer_runs = 16683
# optimizer_runs = 2000
optimizer_runs = 1
# NEVER enable via_ir - use structs to fix stack-too-deep instead
via_ir = false

# [profile.default.solc]
# verbosity = 1

[profile.default.fmt]
skip = ["lib/"]

[lint]
exclude_lints = [
    "erc20-unchecked-transfer",
    "unused-import",
    "mixed-case-variable",
    "mixed-case-function",
    "unaliased-plain-import",
    "screaming-snake-case-immutable",
    "screaming-snake-case-const",
    "pascal-case-struct",
    "incorrect-shift",
    "divide-before-multiply",
    "modifier-style",
    "unsafe-typecast",
    "unwrapped-modifier-logic",
    "unsafe-cheatcode",
    "named-struct-fields"
]
ignore = ["lib/daosys/lib/crane/"]

[rpc_endpoints]
local = "http://127.0.0.1:8545"
ethereum_mainnet_infura = "https://mainnet.infura.io/v3/${INFURA_KEY}"
ethereum_mainnet_alchemy = "https://eth-mainnet.g.alchemy.com/v2/${ALCHEMY_KEY}"
ethereum_sepolia_infura = "https://sepolia.infura.io/v3/${INFURA_KEY}"
sepolia_infura = "https://sepolia.infura.io/v3/${INFURA_KEY}"
ethereum_sepolia_alchemy = "https://eth-sepolia.g.alchemy.com/v2/${ALCHEMY_KEY}"
sepolia_alchemy = "https://eth-sepolia.g.alchemy.com/v2/${ALCHEMY_KEY}"

base_mainnet_infura = "https://base-mainnet.infura.io/v3/${INFURA_KEY}"
base_mainnet_alchemy = "https://base-mainnet.g.alchemy.com/v2/${ALCHEMY_KEY}"
base_sepolia_infura = "https://base-sepolia.infura.io/v3/${INFURA_KEY}"
base_sepolia_alchemy = "https://base-sepolia.g.alchemy.com/v2/${ALCHEMY_KEY}"

optimism_mainnet = "https://opt-mainnet.g.alchemy.com/v2/${ALCHEMY_KEY}"

fantom_mainnet = "https://fantom.drpc.org"

apeChain_rpc = "https://rpc.apechain.com"
apeChain_drpc = "https://apechain.drpc.org"
apeChain_curtis_rpc = "https://rpc.curtis.apechain.com"